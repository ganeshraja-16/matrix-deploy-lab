name: Simple Matrix Test

on:
  push:
    branches: [main]

jobs:
  test-job:
    strategy:
      fail-fast: true
      matrix:
        version: [16, 18, 20]
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Print version
        run: echo "Testing version ${{ matrix.version }}"

      - name: Wait and maybe fail
        run: |
          echo "Starting task for version ${{ matrix.version }}"
          sleep 15
          if [ "${{ matrix.version }}" == "18" ]; then
            echo "Something went wrong!"
            exit 1
          fi
          echo "Task finished successfully for version ${{ matrix.version }}"
