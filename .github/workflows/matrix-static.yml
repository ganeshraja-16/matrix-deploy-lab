name: Simple Matrix Test

on:
  push:
    branches: [main]

jobs:
  test-job:
    strategy:
      fail-fast: false
      matrix:
        version: [16, 18, 20]
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.version == 20 }}
    steps:
      - name: Print version
        run: echo "Testing version ${{ matrix.version }}"

      - name: Wait and maybe fail
        run: |
          echo "Starting task for version ${{ matrix.version }}"
          sleep 15
          echo "Something went wrong!"
          exit 1
